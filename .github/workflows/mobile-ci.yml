name: Mobile CI

on:
  push:
    branches: [main, "feat/**"]
    paths: ["app/**", ".github/workflows/mobile-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["app/**", ".github/workflows/mobile-ci.yml"]
  workflow_dispatch:

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tanken-android-debug
          path: app/composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  ios:
    name: iOS (unsigned IPA)
    runs-on: macos-15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Archive (unsigned, device SDK)
        run: |
          chmod +x gradlew
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Tanken.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        run: |
          cd "$RUNNER_TEMP"
          rm -rf Payload Tanken.ipa
          mkdir -p Payload
          cp -R "Tanken.xcarchive/Products/Applications/Tanken.app" "Payload/"
          zip -qr Tanken.ipa Payload
          ls -lh Tanken.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: tanken-ios-unsigned
          path: ${{ runner.temp }}/Tanken.ipa
          if-no-files-found: error
