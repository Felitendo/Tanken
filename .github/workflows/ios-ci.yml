name: iOS CI

on:
  push:
    branches: [main, "feat/**"]
    paths: ["ios/**", ".github/workflows/ios-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["ios/**", ".github/workflows/ios-ci.yml"]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS (unsigned IPA)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Archive (unsigned, device SDK)
        run: |
          xcodebuild -version
          xcodebuild \
            -project ios/Tanken.xcodeproj \
            -scheme Tanken \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Tanken.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        run: |
          cd "$RUNNER_TEMP"
          rm -rf Payload Tanken.ipa
          mkdir -p Payload
          cp -R "Tanken.xcarchive/Products/Applications/Tanken.app" "Payload/"
          zip -qr Tanken.ipa Payload
          ls -lh Tanken.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: tanken-ios-unsigned
          path: ${{ runner.temp }}/Tanken.ipa
          if-no-files-found: error
