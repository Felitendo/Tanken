name: iOS CI

on:
  push:
    branches: [main, "feat/**"]
    paths: ["ios/**", ".github/workflows/ios-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["ios/**", ".github/workflows/ios-ci.yml"]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS (unsigned IPA)
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Archive (unsigned, device SDK)
        run: |
          xcodebuild -version
          xcodebuild \
            -project ios/Tanken.xcodeproj \
            -scheme Tanken \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Tanken.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        run: |
          cd "$RUNNER_TEMP"
          rm -rf Payload Tanken.ipa
          mkdir -p Payload
          cp -R "Tanken.xcarchive/Products/Applications/Tanken.app" "Payload/"
          zip -qr Tanken.ipa Payload
          ls -lh Tanken.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: tanken-ios-unsigned
          path: ${{ runner.temp }}/Tanken.ipa
          if-no-files-found: error

      # Single rolling "dev" prerelease: the tag is moved to the current commit and the IPA asset
      # is replaced on every push — there is never more than this one release.
      - name: Update rolling dev release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f dev
          git push origin dev --force
          NOTES="Rolling development build (commit ${GITHUB_SHA::7}, $(date -u +'%Y-%m-%d %H:%M UTC')). Unsigned IPA — sign with AltStore/SideStore."
          if gh release view dev --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit dev --repo "$GITHUB_REPOSITORY" --prerelease --title "Tanken iOS Dev" --notes "$NOTES"
          else
            gh release create dev --repo "$GITHUB_REPOSITORY" --prerelease --title "Tanken iOS Dev" --notes "$NOTES"
          fi
          gh release upload dev "$RUNNER_TEMP/Tanken.ipa" --repo "$GITHUB_REPOSITORY" --clobber
